name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest 2>&1 | tee pytest.log

      - name: Report pytest failure
        if: failure()
        shell: bash
        run: |
          if [[ ! -f pytest.log ]]; then
            echo "pytest.log was not created." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "### pytest failure on Python ${{ matrix.python-version }}"
            echo '```text'
            tail -n 200 pytest.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          details="$(tail -n 80 pytest.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
          echo "::error title=pytest failure::$details"

      - name: Build distributions
        if: matrix.python-version == '3.11'
        run: python -m build
