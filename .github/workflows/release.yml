name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  compatibility-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  build-release:
    needs: compatibility-test
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[dev,adapters]"

      - name: Run tests
        run: python -m pytest

      - name: Check API documentation coverage
        run: |
          python -m oodocs apidoc check . \
            --config pyproject.toml \
            --fail-under 0.90

      - name: Check API help categories
        run: |
          python - <<'PY'
          from oodocs.apidoc import ApiHelpBookConfig, check_api_help_categories

          build = ApiHelpBookConfig.from_pyproject(".")
          issues = check_api_help_categories(build.collect("."))
          if issues:
              raise SystemExit("\n".join(issue.message for issue in issues))
          PY

      - name: Build distributions
        run: python -m build

      - name: Render release documents
        run: |
          python examples/usage_guide_example/main.py --outputs pdf
          python - <<'PY'
          from oodocs.apidoc import ApiHelpBookConfig

          ApiHelpBookConfig.from_pyproject(".").save_all(
              ".",
              output_formats=("pdf",),
              sidecars=False,
          )
          PY

      - name: Store Python distributions for PyPI job
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Resolve release notes
        id: release_notes
        shell: bash
        run: |
          notes_path="release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$notes_path" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=$notes_path" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release with repo notes
        if: steps.release_notes.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            artifacts/usage-guide/oodocs-user-guide.pdf
            artifacts/api/oodocs-api.pdf
          body_path: ${{ steps.release_notes.outputs.path }}

      - name: Publish GitHub Release
        if: steps.release_notes.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            artifacts/usage-guide/oodocs-user-guide.pdf
            artifacts/api/oodocs-api.pdf
          generate_release_notes: true

  publish-pypi:
    name: Publish Python distribution to PyPI
    needs: build-release
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/oodocs

    permissions:
      id-token: write

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
