name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  compatibility-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  build-release:
    needs: compatibility-test
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[dev,adapters]"

      - name: Run tests
        run: python -m pytest

      - name: Check API documentation coverage
        run: |
          python -m oodocs apidoc check . \
            --config pyproject.toml \
            --fail-under 0.90 \
            --save-json artifacts/api-objects-example/oodocs-api-coverage.json \
            --save-csv artifacts/api-objects-example/oodocs-api-coverage.csv

      - name: Build distributions
        run: python -m build

      - name: Render release documents
        run: |
          python examples/usage_guide_example/main.py
          python examples/journal_paper_example/main.py
          python examples/native_benchmark_report/main.py
          python examples/release_notes_digest/main.py
          python examples/api_objects_example/main.py . --config pyproject.toml
          python examples/style_cleanup_smoke/main.py
          python examples/template_presets/build_all.py
          python examples/project_metadata_report/main.py
          python examples/cli_manual_example/main.py
          python - <<'PY'
          from oodocs.apidoc import ApiHelpBookConfig

          ApiHelpBookConfig.from_pyproject(".").save_all(".")
          PY

      - name: Build release evidence
        run: python -m oodocs.evidence build --out artifacts/evidence

      - name: Store Python distributions for PyPI job
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Resolve release notes
        id: release_notes
        shell: bash
        run: |
          notes_path="release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$notes_path" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=$notes_path" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release with repo notes
        if: steps.release_notes.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            artifacts/usage-guide/oodocs-user-guide.pdf
            artifacts/journal-paper/oodocs-development-philosophy.pdf
            artifacts/native-benchmark-report/native-python-benchmark.pdf
            artifacts/native-benchmark-report/native-python-benchmark.json
            artifacts/release-notes/oodocs-release-notes.pdf
            artifacts/release-notes/release-notes-import-diagnostics.json
            artifacts/template/journal-article-template.pdf
            artifacts/project-metadata-report/project-metadata-report.pdf
            artifacts/project-metadata-report/project-metadata.json
            artifacts/cli-manual-example/cli-manual.pdf
            artifacts/api-objects-example/oodocs-api-object-composition.pdf
            artifacts/api-objects-example/oodocs-api-object-tree.json
            artifacts/api-objects-example/oodocs-api-coverage.json
            artifacts/api-objects-example/oodocs-api-coverage.csv
            artifacts/api-objects-example/oodocs-api-reference.docx
            artifacts/api-objects-example/oodocs-api-reference.pdf
            artifacts/api-objects-example/oodocs-api-reference.html
            artifacts/api/oodocs-api.docx
            artifacts/api/oodocs-api.pdf
            artifacts/api/oodocs-api.html
            artifacts/api/oodocs-api-object-tree.json
            artifacts/api/oodocs-api-coverage.json
            artifacts/api/oodocs-api-coverage.csv
            artifacts/evidence/oodocs-evidence-report.pdf
          body_path: ${{ steps.release_notes.outputs.path }}

      - name: Publish GitHub Release
        if: steps.release_notes.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            artifacts/usage-guide/oodocs-user-guide.pdf
            artifacts/journal-paper/oodocs-development-philosophy.pdf
            artifacts/native-benchmark-report/native-python-benchmark.pdf
            artifacts/native-benchmark-report/native-python-benchmark.json
            artifacts/release-notes/oodocs-release-notes.pdf
            artifacts/release-notes/release-notes-import-diagnostics.json
            artifacts/template/journal-article-template.pdf
            artifacts/project-metadata-report/project-metadata-report.pdf
            artifacts/project-metadata-report/project-metadata.json
            artifacts/cli-manual-example/cli-manual.pdf
            artifacts/api-objects-example/oodocs-api-object-composition.pdf
            artifacts/api-objects-example/oodocs-api-object-tree.json
            artifacts/api-objects-example/oodocs-api-coverage.json
            artifacts/api-objects-example/oodocs-api-coverage.csv
            artifacts/api-objects-example/oodocs-api-reference.docx
            artifacts/api-objects-example/oodocs-api-reference.pdf
            artifacts/api-objects-example/oodocs-api-reference.html
            artifacts/api/oodocs-api.docx
            artifacts/api/oodocs-api.pdf
            artifacts/api/oodocs-api.html
            artifacts/api/oodocs-api-object-tree.json
            artifacts/api/oodocs-api-coverage.json
            artifacts/api/oodocs-api-coverage.csv
            artifacts/evidence/oodocs-evidence-report.pdf
          generate_release_notes: true

  publish-pypi:
    name: Publish Python distribution to PyPI
    needs: build-release
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/oodocs

    permissions:
      id-token: write

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
